name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  format:
    runs-on: ubuntu-latest
    name: format
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: ./scripts/ci.sh fmt

  clippy:
    runs-on: ubuntu-latest
    name: clippy
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/ci.sh clippy

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - nightly
        os:
          - ubuntu-latest
          - macos-latest
    name: tests/${{ matrix.rust }}/${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install MPI
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev
      - uses: Swatinem/rust-cache@v2
      - name: Tests (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/ci.sh test
      - name: Tests (macOS, no MPI)
        if: runner.os == 'macOS'
        run: ./scripts/ci.sh --no-mpi test

  docs:
    runs-on: ubuntu-latest
    name: docs
    env:
      RUSTDOCFLAGS: "-Dwarnings --cfg docsrs"
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/ci.sh doc

  miri:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    name: miri/${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: ./scripts/ci.sh miri

  deny:
    runs-on: ubuntu-latest
    name: deny
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2

  spellcheck:
    runs-on: ubuntu-latest
    name: spellcheck
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-spellcheck@0.15.5
      - run: ./scripts/ci.sh spellcheck

  success:
    name: Success
    runs-on: ubuntu-latest
    needs: [format, clippy, tests, docs, miri, deny, spellcheck]
    if: always()
    steps:
      - name: check if any dependency failed
        run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
