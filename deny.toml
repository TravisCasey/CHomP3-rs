[advisories]
yanked = "warn"
unmaintained = "workspace"
unsound = "workspace"

[licenses]
allow = [
    "GPL-3.0-or-later",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
