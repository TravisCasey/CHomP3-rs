[advisories]
yanked = "warn"
unmaintained = "workspace"
unsound = "workspace"
ignore = [
    # Bincode is unmaintained but v2.0.1 is stable and functional for our
    # MPI serialization needs. Used only behind the `mpi` feature flag.
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "GPL-3.0-or-later",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
